[workspace]
members = [
  "crates/*",
]

resolver = "3"

[workspace.package]
authors = ["kiki-kanri"]
categories = [
  "asynchronous",
  "concurrency",
  "network-programming",
  "web-programming::websocket",
]

description = "An async, event-driven WebSocket framework inspired by Socket.IO."
edition = "2024"
homepage = "https://github.com/ws-io/ws.io-rs"
keywords = [
  "messaging",
  "network",
  "realtime",
  "websocket",
  "ws",
]

license = "MIT"
repository = "https://github.com/ws-io/ws.io-rs"

# Profiles
[profile.release]
codegen-units = 1
debug = false
incremental = false
lto = "fat"
opt-level = 3
overflow-checks = true
panic = "abort"
strip = "symbols"
