[package]
name = "crate-name"
version = "0.1.0"

authors.workspace = true
categories.workspace = true
description = ""
edition.workspace = true
homepage.workspace = true
include = [
  "Cargo.toml",
  "README.md",
  "src/**/*",
]

keywords.workspace = true
license.workspace = true
readme = "./README.md"
repository.workspace = true

# Optional package metadata
# rust-version.workspace = true
# documentation = "https://docs.rs/crate-name"
# exclude = []
# publish = true
# build = "build.rs"
# links = "native-library-name"

# Optional cargo metadata
# [package.metadata]

# Optional lint configuration
[lints]
workspace = true

# Features
[features]
## Default, aliases, and feature groups
default = []
all = []
full = ["all"]

## Feature flags
# feature-name = ["dep:optional-dependency"]

# Dependencies
[dependencies]

# Target-specific dependencies
# [target.'cfg(unix)'.dependencies]
#
# [target.'cfg(windows)'.dependencies]
#
# [target.'cfg(target_arch = "wasm32")'.dependencies]

# Build dependencies
# [build-dependencies]

# Target-specific build dependencies
# [target.'cfg(unix)'.build-dependencies]

# Development dependencies
# [dev-dependencies]

# Target-specific development dependencies
# [target.'cfg(unix)'.dev-dependencies]

# Library target
# [lib]
# name = "crate_name"
# path = "src/lib.rs"
# crate-type = ["lib"]
# doctest = true

# Binary targets
# [[bin]]
# name = "crate-name"
# path = "src/main.rs"
# required-features = []

# Example targets
# [[example]]
# name = "example-name"
# path = "examples/example-name.rs"
# required-features = []

# Test targets
# [[test]]
# name = "integration"
# path = "tests/integration.rs"
# required-features = []

# Benchmark targets
# [[bench]]
# name = "benchmark-name"
# path = "benches/benchmark-name.rs"
# harness = false
# required-features = []

# Optional build profiles. Prefer defining profiles at the workspace root.
# [profile.dev]
#
# [profile.release]
#
# [profile.test]
#
# [profile.bench]

# Optional dependency overrides. Prefer defining patches at the workspace root.
# [patch.crates-io]
#
# [replace]
