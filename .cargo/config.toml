# Maybe you want to enable cranelift backend for faster builds in development mode
# Reference: https://canmi.net/posts/development/rust-build-config-cranelift-profile-optimization
# [profile.dev.package.xxx] or [profile.dev]
# codegen-backend = "cranelift"

[unstable]
# codegen-backend = true
profile-rustflags = true

[alias]
coverage = "llvm-cov --all-features --color always"
coverage-generate = "llvm-cov --all-features --lcov --output-path ./lcov.info"
format = "fmt --all -- --check"
format-fix = "fmt --all"
lint = "clippy --all-features --all-targets -- -D warnings"
lint-fix = "clippy --all-features --all-targets --fix -- -D warnings"

[net]
git-fetch-with-cli = true

[profile.dev]
rustflags = [
  "-C", "link-arg=-fuse-ld=mold",
  # "--cfg", "reqwest_unstable",
]

[profile.release]
rustflags = [
  "-C", "link-arg=-fuse-ld=mold",
  "-C", "link-arg=-Wl,--icf=all",
  "-C", "relro-level=full",
  # "-C", "target-cpu=native",
  # "--cfg", "reqwest_unstable",
]

