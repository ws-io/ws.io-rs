# Cargo config template.
# Release target-specific rustflags should live in release scripts because Cargo
# config cannot express "release AND this target" for rustflags.
# If a script sets RUSTFLAGS/CARGO_ENCODED_RUSTFLAGS, it replaces target/build
# rustflags instead of merging, so the script must provide the complete set.

[unstable]
profile-rustflags = true

[alias]
coverage = "llvm-cov --all-features --color always --quiet"
coverage-generate = "llvm-cov --all-features --lcov --output-path ./lcov.info --quiet"
format = "fmt --all -- --check"
format-fix = "fmt --all"
lint = "clippy --all-features --all-targets --message-format=short --quiet"
lint-fix = "clippy --all-features --all-targets --fix --message-format=short --quiet"
lint-strict = "clippy --all-features --all-targets --quiet -- -D warnings"

[net]
git-fetch-with-cli = true

# Profiles

[profile.dev]
rustflags = [
  # "--cfg", "reqwest_unstable",
  # "--cfg", "tokio_unstable",
]

[profile.release]
rustflags = [
  "-C", "force-frame-pointers=yes",
  # "-C", "target-cpu=native",
  # "--cfg", "reqwest_unstable",
  # "--cfg", "tokio_unstable",
]

# Targets

# Dev-safe target-wide examples only. Release-only target flags belong in scripts.
[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "link-arg=-fuse-ld=mold",
]
